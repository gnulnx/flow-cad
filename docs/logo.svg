<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="100%" stop-color="#060913"/>
    </radialGradient>
    
    <!-- Accent Gradients -->
    <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cyan-indigo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Slate Backdrop Card -->
  <rect width="800" height="280" rx="16" fill="url(#bg-grad)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="2"/>

  <!-- Decorative Grid (Subtle) -->
  <g opacity="0.06">
    <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200 M 0,240 L 800,240" stroke="#ffffff" stroke-width="1"/>
    <path d="M 100,0 L 100,280 M 200,0 L 200,280 M 300,0 L 300,280 M 400,0 L 400,280 M 500,0 L 500,280 M 600,0 L 600,280 M 700,0 L 700,280" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- 3D Geometric Logo Mark -->
  <g transform="translate(100, 140)">
    <!-- Glow Backing -->
    <circle cx="0" cy="0" r="64" fill="none" stroke="url(#flow-grad)" stroke-width="2" opacity="0.15" filter="url(#glow)"/>
    
    <!-- Outer Orbit/Chassis Guide -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.5" stroke-dasharray="6,6"/>
    
    <!-- 3D Node Lines -->
    <line x1="-50" y1="30" x2="50" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="2,2"/>
    <line x1="0" y1="-60" x2="-50" y2="30" stroke="url(#cyan-indigo)" stroke-width="2.5"/>
    <line x1="0" y1="-60" x2="50" y2="30" stroke="url(#cyan-indigo)" stroke-width="2.5"/>
    <line x1="0" y1="-60" x2="0" y2="30" stroke="rgba(6, 182, 212, 0.3)" stroke-width="1.5"/>
    <line x1="-50" y1="30" x2="0" y2="65" stroke="url(#flow-grad)" stroke-width="2"/>
    <line x1="50" y1="30" x2="0" y2="65" stroke="url(#flow-grad)" stroke-width="2"/>

    <!-- Balance Bot Wheels (Subtle Reference) -->
    <circle cx="-50" cy="30" r="14" fill="#0c1222" stroke="url(#cyan-indigo)" stroke-width="3" filter="url(#glow)"/>
    <circle cx="50" cy="30" r="14" fill="#0c1222" stroke="url(#cyan-indigo)" stroke-width="3" filter="url(#glow)"/>
    <circle cx="-50" cy="30" r="4" fill="#00f5d4"/>
    <circle cx="50" cy="30" r="4" fill="#00f5d4"/>

    <!-- Vertex Snap Nodes -->
    <!-- Top Snap (Snapped - Green 'Correct') -->
    <circle cx="0" cy="-60" r="10" fill="#10b981" filter="url(#glow)"/>
    <circle cx="0" cy="-60" r="4" fill="#ffffff"/>
    
    <!-- Center Node -->
    <circle cx="0" cy="30" r="6" fill="#6366f1" opacity="0.8"/>
    
    <!-- Bottom Connector Node -->
    <circle cx="0" cy="65" r="8" fill="none" stroke="#00f5d4" stroke-width="2"/>
    <circle cx="0" cy="65" r="3" fill="#00f5d4"/>
  </g>

  <!-- Brand Typography -->
  <g transform="translate(240, 160)">
    <!-- Title "Flow CAD" -->
    <text x="0" y="-15" font-family="'Inter', sans-serif" font-size="54" font-weight="800" fill="#ffffff" letter-spacing="-0.03em">
      Flow<tspan fill="url(#cyan-indigo)">CAD</tspan>
    </text>
    
    <!-- Subtitle / Tagline -->
    <text x="3" y="24" font-family="'Fira Code', 'Inter', monospace" font-size="14" font-weight="500" fill="#64748b" letter-spacing="0.32em" text-transform="uppercase">
      High-Precision 3D Workspace
    </text>
  </g>
</svg>
